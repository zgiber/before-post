<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pause Before You Post</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">
          EN
        </button>
        <button class="lang-btn" id="btn-hu" onclick="setLang('hu')">HU</button>
      </div>
      <header>
        <h1 id="hdr-title">Post Before You <em>Post</em></h1>
        <p id="hdr-sub">
          A quick guide to keeping your feed constructive and drama-free.
        </p>
      </header>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>
      <div id="card-container"></div>
      <footer id="footer-text">
        Think before you post · Spread signal, not noise
      </footer>
    </div>
    <script src="content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
